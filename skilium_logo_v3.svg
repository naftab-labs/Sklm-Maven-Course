<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#000000"/>
  
  <!-- Circular container with gradient effect -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#grad1)" stroke-width="6"/>
  <!-- Inner filled circle -->
  <circle cx="200" cy="200" r="120" fill="#0a0a1a"/>
  
  <!-- Stylized S - minimalist -->
  <path d="M 160 140 
           Q 200 120, 240 140 
           Q 260 170, 240 200 
           Q 220 200, 180 210
           Q 140 220, 160 250
           Q 180 280, 220 270"
        fill="none" 
        stroke="#00d4ff" 
        stroke-width="16" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Book/lightbulb accent - represents education/ideas -->
  <path d="M 200 80 L 200 100" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M 240 90 L 230 105" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M 160 90 L 170 105" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Four corner nodes representing pillars or students -->
  <circle cx="120" cy="120" r="5" fill="#00d4ff"/>
  <circle cx="280" cy="120" r="5" fill="#00d4ff"/>
  <circle cx="120" cy="280" r="5" fill="#00d4ff"/>
  <circle cx="280" cy="280" r="5" fill="#00d4ff"/>
  
  <!-- Connecting lines to center - community/network -->
  <line x1="125" y1="125" x2="160" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="125" x2="240" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="125" y1="275" x2="160" y2="220" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="275" x2="240" y2="220" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  
</svg>