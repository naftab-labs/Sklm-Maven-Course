<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#000000"/>
  
  <!-- Hexagon frame -->
  <polygon points="200,40 346,120 346,280 200,360 54,280 54,120" 
           fill="none" 
           stroke="#00d4ff" 
           stroke-width="4"
           opacity="0.8"/>
  
  <!-- Inner hexagon -->
  <polygon points="200,80 306,140 306,260 200,320 94,260 94,140" 
           fill="#0a0a0a" 
           stroke="#00d4ff" 
           stroke-width="2"
           opacity="0.9"/>
  
  <!-- Stacked S shape / learning curve -->
  <!-- Top wave -->
  <path d="M 130 150 Q 165 120, 200 150 Q 235 180, 270 150" 
        fill="none" 
        stroke="#00d4ff" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Middle wave -->
  <path d="M 130 190 Q 165 160, 200 190 Q 235 220, 270 190" 
        fill="none" 
        stroke="#00d4ff" 
        stroke-width="10" 
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- Bottom wave - ascending trend -->
  <path d="M 130 230 Q 165 200, 200 230 Q 235 260, 270 230 L 270 210" 
        fill="none" 
        stroke="#00d4ff" 
        stroke-width="10" 
        stroke-linecap="round"
        opacity="0.9"/>
  
  <!-- Arrow pointing up - growth/progress -->
  <polygon points="270,210 290,180 250,180" fill="#00d4ff"/>
  
  <!-- Connection dots -->
  <circle cx="130" cy="150" r="6" fill="#00d4ff"/>
  <circle cx="270" cy="150" r="6" fill="#00d4ff"/>
  <circle cx="130" cy="190" r="6" fill="#00d4ff"/>
  <circle cx="270" cy="190" r="6" fill="#00d4ff"/>
  <circle cx="200" cy="190" r="8" fill="#00d4ff"/>
  
  <!-- Corner accents -->
  <circle cx="200" cy="40" r="8" fill="#00d4ff" opacity="0.6"/>
  <circle cx="346" cy="120" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="346" cy="280" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="200" cy="360" r="8" fill="#00d4ff" opacity="0.6"/>
  <circle cx="54" cy="280" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="54" cy="120" r="6" fill="#00d4ff" opacity="0.6"/>
</svg>